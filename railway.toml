[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.backend"

[deploy]
startCommand = "sh -c 'uvicorn main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "backend"
source = "backend"

[[services]]
name = "frontend"
source = "frontend"
dockerfilePath = "Dockerfile.frontend"
